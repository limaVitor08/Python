{% extends "layout.html" %}
{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<h1>{{ titulo }}</h1>

{% if erro %}
<p class="erro">{{ erro }}</p>
{% endif %}

<form method="POST"
      action="{% if cliente_id %}{{ url_for('clientes.editar', cliente_id=cliente_id) }}{% else %}{{ url_for('clientes.cadastrar') }}{% endif %}">
    <div class="form-grupo">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required value="{{ nome or '' }}">
    </div>
    <div class="form-grupo">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required value="{{ email or '' }}">
    </div>
    <div class="form-grupo">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" name="telefone" value="{{ telefone or '' }}">
    </div>
    <button type="submit">Salvar</button>
</form>

<p><a href="{{ url_for('clientes.listar') }}">← Voltar</a></p>
{% endblock %}
